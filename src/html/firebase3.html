<!--This code initializes a Firebase app and connects to Firestore-->
<!--It generates a random number when the "Send Random Data" button is clicked-->
<!--and writes it to a specific document in the "courses" collection-->
<!-- The page also displays a status message indicating whether the data was successfully sent or if an error occurred-->
<!-- getDatabase is not used , it is apart of the Realtime Database , This project is currently using Firestore database-->
<!DOCTYPE html>
<html>
<head>
  <title>Firebase App</title>
</head>
<body>

<h1>Welcome to Firebase App</h1>

<!-- Button to trigger sending random data to Firestore -->
<button id="submitBtn">Send Random Data</button>
<!-- Paragraph to display status messages such as success or error -->
<p id="status"></p>

<!-- Import Firebase modules needed for app initialization and Firestore access -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

  // Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyDYihlGnHUR0oY-Y-vpF9AqE-508rZ6ChM",
    authDomain: "smart-hurley-test.firebaseapp.com",
    projectId: "smart-hurley-test",
    storageBucket: "smart-hurley-test.firebasestorage.app",
    messagingSenderId: "225681247262",
    appId: "1:225681247262:web:e4823270af67e2bce3b20f"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  // Initialize Firestore database for reading/writing documents
  const firestore = getFirestore(app);

  // Log Firebase app initialization to the console for debugging
  console.log("Firebase initialized:", app);
  

  // Function to send data
  async function sendData() {
    const randomData = Math.floor(Math.random() * 100); // Generate random number

    // Create's a reference to a specific document in the 'courses' collection with ID '001'
    const userRef = doc(firestore, "courses", "001"); // Firestore path

    try {
      // Write data to Firestore document, overwriting any existing data
      await setDoc(userRef, {
        name: "John Doe",
        age: 30,
        randomData: randomData
      });
      // Log success to console
      console.log("Document written:", userRef.id);
      document.getElementById("status").textContent = "Data sent: " + randomData;
      // Log any errors to the console
    } catch (error) {
      // Show error message in the status paragraph
      console.error("Error writing document:", error);
      document.getElementById("status").textContent = "Error: " + error.message;
    }
  }

  // Attach the sendData function to the click event of the submit button
  // When the button is clicked, sendData() will run
  document.getElementById("submitBtn").addEventListener("click", sendData);

</script>

</body>
</html>
